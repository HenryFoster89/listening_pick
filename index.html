<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascolti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&family=Playfair+Display:ital@1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #e8e8e4;
  }

  body {
    background: #e8e8e4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 24px 60px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── LAYOUT ── */
  .layout {
    position: relative;
  }

  .poster {
    width: 640px;
    background: #f2f2ef;
    padding: 40px 40px 36px;
    box-shadow: 0 2px 32px rgba(0,0,0,0.10);
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-top: 3px solid #111;
    border-bottom: 1px solid #bbb;
    padding: 10px 0 8px;
    margin-bottom: 28px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: #111;
    line-height: 1;
  }

  .header-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
  }

  .cell {
    aspect-ratio: 1;
    background: #ddd;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .cell-tooltip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(17, 17, 17, 0.82);
    color: #f2f2ef;
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    line-height: 1.5;
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    z-index: 10;
  }

  .cell-tooltip .tooltip-artist {
    font-weight: 400;
    display: block;
  }

  .cell-tooltip .tooltip-title {
    display: block;
    color: #bbb;
  }

  .cell:hover .cell-tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .cell img.loaded { opacity: 1; }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #999;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 12px;
    line-height: 1.6;
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 1px solid #bbb;
    margin-top: 22px;
    padding-top: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .footer-latin {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #444;
    letter-spacing: 0.04em;
    text-align: center;
    white-space: nowrap;
  }

  /* ── SIDE PANEL ── */
  .side-panel {
    position: absolute;
    top: 0;
    width: 320px;
    background: #f2f2ef;
    padding: 24px 20px;
    box-shadow: 0 2px 32px rgba(0,0,0,0.10);
    opacity: 0;
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }

  .side-panel.panel-left  { right: calc(100% + 20px); transform: translateX(-6px); }
  .side-panel.panel-right { left:  calc(100% + 20px); transform: translateX( 6px); }

  .side-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .panel-header {
    border-top: 3px solid #111;
    border-bottom: 1px solid #bbb;
    padding: 8px 0 7px;
    margin-bottom: 18px;
  }

  .panel-header-artist {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: #111;
    line-height: 1.1;
  }

  .panel-header-album {
    display: block;
    font-size: 9px;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .panel-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .panel-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .panel-key {
    font-size: 8px;
    font-weight: 400;
    color: #aaa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .panel-val {
    font-size: 11px;
    font-weight: 300;
    color: #222;
    letter-spacing: 0.03em;
  }

  .panel-section-label {
    font-size: 8px;
    font-weight: 400;
    color: #aaa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-top: 1px solid #ddd;
    padding-top: 14px;
    margin-bottom: 6px;
  }

  .panel-description {
    padding-top: 0;
    font-size: 10px;
    font-weight: 300;
    color: #555;
    line-height: 1.7;
    letter-spacing: 0.02em;
  }

  .panel-review {
    display: block;
    margin-top: 14px;
    font-size: 10px;
    font-weight: 400;
    color: #111;
    letter-spacing: 0.06em;
    text-decoration: none;
    border-bottom: 1px solid #111;
    padding-bottom: 1px;
    width: fit-content;
  }

  .panel-review:hover {
    color: #555;
    border-color: #555;
  }

  @media print {
    html, body { background: white; padding: 0; }
    .poster {
      width: 30cm;
      box-shadow: none;
      padding: 1.4cm 1.4cm 1.2cm;
    }
    .side-panel { display: none; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="layout">

<div class="poster">

  <div class="header">
    <span class="header-title">Carmina</span>
    <span class="header-meta" id="week-label"></span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    <span class="footer-latin">AD SANANDUM AUREM POST OPPIDUM MATUTIANUM</span>
  </div>

</div>

<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <span class="panel-header-artist" id="panel-artist"></span>
    <span class="panel-header-album" id="panel-album"></span>
  </div>
  <div class="panel-fields">
    <div class="panel-row">
      <span class="panel-key">Anno</span>
      <span class="panel-val" id="panel-year">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-key">Casa di produzione</span>
      <span class="panel-val" id="panel-label">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-key">Produttore</span>
      <span class="panel-val" id="panel-producer">—</span>
    </div>
  </div>
  <div class="panel-section-label" id="panel-desc-label" style="display:none">L'angolo del Folleggiante</div>
  <p class="panel-description" id="panel-description"></p>
  <a class="panel-review" id="panel-review" target="_blank" style="display:none">La recensione →</a>
  <a class="panel-review" id="panel-live" target="_blank" style="display:none">Il live →</a>
</div>

</div>

<script>
  // ── EDIT HERE ogni due settimane ─────────────────────────
  const ALBUMS = [
    { artist: "James Blake",  title: "Trying Times",              description: "", spotifyUrl: "https://open.spotify.com/prerelease/1MzPK6VGgb527EJa9CdZ08?si=c3ab6d532461461c" },
    { artist: "Neoprimitivi", title: "Il sangue è pronto",        description: "Secondo album dei primitivi, che devono il nome al pezzo \"Shock in my town\" del Maestro Battiato.\nL'immersione in questa suite di 38 minuti, che mischia 6 tracce senza alcuna soluzione di continuità, è estraniante: prog, jazz, cristianesimo, fosca psichedelia e fantascienza si intrecciano per l'intera durata dell'unico brano presente.", reviewUrl: "https://www.rollingstone.it/musica/storie-musica/neoprimitivi-o-retromaniaci/974238/", spotifyUrl: "https://open.spotify.com/intl-it/album/6zLLXWA3RZ9QECufUhAecQ?si=mdA7z1_rQB66qE7UFrsJmg" },
    { artist: "Mitski",       title: "Nothing's About to Happen", description: "", spotifyUrl: "https://open.spotify.com/intl-it/album/2M9F3AsbWy7n4LwmJ8pqEu?si=PJ-7RsSGRr6zaw1IRbOlPQ" },
    { artist: "Gaia Banfi",   title: "La maccaia",                description: "", reviewUrl: "https://www.ondarock.it/recensioni/2025-gaiabanfi-lamaccaia.htm", liveUrl: "https://www.youtube.com/watch?v=Tp3jVA69wZI", spotifyUrl: "https://open.spotify.com/intl-it/album/4atG7yAO3KzgNissARQQM4?si=bkCydmYzRmWp2sl1wXYoIQ" },
  ];
  // ─────────────────────────────────────────────────────────

  function toRoman(n) {
    const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
    const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
    let result = '';
    for (let i = 0; i < vals.length; i++) {
      while (n >= vals[i]) { result += syms[i]; n -= vals[i]; }
    }
    return result;
  }
  function getWeekNum() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 1);
    return Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  }

  const now = new Date();
  document.getElementById('week-label').textContent = `${toRoman(getWeekNum())} · ${toRoman(now.getFullYear())}`;

  // ── META CACHE ────────────────────────────────────────────
  const metaCache = {};

  async function fetchAlbumMeta(artist, title) {
    const key = `${artist}|${title}`;
    if (metaCache[key]) return metaCache[key];

    let year = '—', label = '—', producer = '—';

    // iTunes: anno (fallback)
    try {
      const q = encodeURIComponent(`${artist} ${title}`);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=3&country=it`);
      const data = await res.json();
      if (data.resultCount > 0) {
        const match = data.results.find(r =>
          r.artistName.toLowerCase().includes(artist.toLowerCase())
        ) || data.results[0];
        if (match.releaseDate) year = match.releaseDate.substring(0, 4);
      }
    } catch(e) {}

    // Discogs: anno, label e produttore
    try {
      const searchRes = await fetch(
        `https://api.discogs.com/database/search?artist=${encodeURIComponent(artist)}&release_title=${encodeURIComponent(title)}&type=release&per_page=3`
      );
      const searchData = await searchRes.json();
      if (searchData.results?.length) {
        const releaseId = searchData.results[0].id;
        await new Promise(r => setTimeout(r, 300));
        const detailRes = await fetch(`https://api.discogs.com/releases/${releaseId}`);
        const detail = await detailRes.json();
        if (detail.year) year = String(detail.year);
        if (detail.labels?.length) label = detail.labels[0].name;
        const prod = detail.extraartists?.find(a => a.role?.toLowerCase().includes('produc'));
        if (prod) producer = prod.name;
      }
    } catch(e) {}

    const meta = { year, label, producer };
    metaCache[key] = meta;
    return meta;
  }

  // ── COVER FETCH ───────────────────────────────────────────
  async function fetchCover(artist, title) {
    const q = encodeURIComponent(`${artist} ${title}`);
    try {
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=3&country=it`);
      const data = await res.json();
      if (data.resultCount > 0) {
        const match = data.results.find(r =>
          r.artistName.toLowerCase().includes(artist.toLowerCase())
        ) || data.results[0];
        return match.artworkUrl100.replace('100x100bb', '600x600bb');
      }
    } catch(e) {}
    return null;
  }

  // ── PANEL ─────────────────────────────────────────────────
  const panel      = document.getElementById('side-panel');
  const elArtist   = document.getElementById('panel-artist');
  const elAlbum    = document.getElementById('panel-album');
  const elYear     = document.getElementById('panel-year');
  const elLabel    = document.getElementById('panel-label');
  const elProducer = document.getElementById('panel-producer');
  const elDesc      = document.getElementById('panel-description');
  const elDescLabel = document.getElementById('panel-desc-label');
  const elReview   = document.getElementById('panel-review');
  const elLive     = document.getElementById('panel-live');
  let hideTimeout;

  function showPanel(album, index) {
    clearTimeout(hideTimeout);
    const isLeft = index % 2 === 0;
    panel.classList.toggle('panel-left',  isLeft);
    panel.classList.toggle('panel-right', !isLeft);
    elArtist.textContent   = album.artist;
    elAlbum.textContent    = album.title;
    elYear.textContent     = '…';
    elLabel.textContent    = '…';
    elProducer.textContent = '…';
    const desc = album.description || '';
    elDesc.textContent          = desc;
    elDescLabel.style.display   = desc ? '' : 'none';
    if (album.reviewUrl) {
      elReview.href          = album.reviewUrl;
      elReview.style.display = '';
    } else {
      elReview.style.display = 'none';
    }
    if (album.liveUrl) {
      elLive.href          = album.liveUrl;
      elLive.style.display = '';
    } else {
      elLive.style.display = 'none';
    }
    panel.classList.add('visible');

    fetchAlbumMeta(album.artist, album.title).then(meta => {
      elYear.textContent     = meta.year;
      elLabel.textContent    = meta.label;
      elProducer.textContent = meta.producer;
    });
  }

  function scheduleHide() {
    hideTimeout = setTimeout(() => panel.classList.remove('visible'), 150);
  }

  panel.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
  panel.addEventListener('mouseleave', scheduleHide);

  // ── GRID ──────────────────────────────────────────────────
  async function buildGrid() {
    const grid = document.getElementById('grid');
    for (const [index, album] of ALBUMS.entries()) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      cell.addEventListener('click', () => {
        window.open(album.spotifyUrl, '_blank');
      });
      cell.addEventListener('mouseenter', () => showPanel(album, index));
      cell.addEventListener('mouseleave', scheduleHide);

      const tooltip = document.createElement('div');
      tooltip.className = 'cell-tooltip';
      tooltip.innerHTML = `<span class="tooltip-artist">${album.artist}</span><span class="tooltip-title">${album.title}</span>`;
      cell.appendChild(tooltip);

      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.textContent = `${album.artist} — ${album.title}`;
      cell.appendChild(ph);
      grid.appendChild(cell);

      const url = await fetchCover(album.artist, album.title);
      if (url) {
        const img = document.createElement('img');
        img.alt = `${album.artist} – ${album.title}`;
        img.src = url;
        img.onload = () => { img.classList.add('loaded'); ph.style.display = 'none'; };
        cell.appendChild(img);
      }
    }
  }

  buildGrid();
</script>
</body>
</html>
